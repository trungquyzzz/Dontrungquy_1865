<!DOCTYPE html>
<html lang="en">
<head>
    <title>Transposition Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
    <div class="container mt-4">
        <h3 class="text-center font-weight-bold">TRANSPOSITION CIPHER</h3>

        <table class="table mt-4">
            <tr><td style="font-weight: bold; color: blue">ENCRYPTION</td></tr>
            <tr>
                <td>
                    <form id="transposition-encrypt-form">
                        <div class="mb-3">
                            <label class="form-label">Plain text:</label>
                            <input type="text" class="form-control" id="transpositionPlainText" placeholder="Input Plain Text" required autofocus/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Key (column count):</label>
                            <input type="number" min="2" class="form-control" id="transpositionKeyEncrypt" placeholder="Input Key" required/>
                        </div>
                        <button type="submit" class="btn btn-primary">Encrypt</button>
                    </form>
                    <div class="mt-2">
                        <label class="form-label font-weight-bold">Encrypted text:</label>
                        <input type="text" class="form-control" id="transpositionEncryptedResult" readonly/>
                    </div>
                </td>
            </tr>

            <tr><td style="font-weight: bold; color: blue">DECRYPTION</td></tr>
            <tr>
                <td>
                    <form id="transposition-decrypt-form">
                        <div class="mb-3">
                            <label class="form-label">Cipher text:</label>
                            <input type="text" class="form-control" id="transpositionCipherText" placeholder="Input Cipher Text" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Key (column count):</label>
                            <input type="number" min="2" class="form-control" id="transpositionKeyDecrypt" placeholder="Input Key" required/>
                        </div>
                        <button type="submit" class="btn btn-success">Decrypt</button>
                    </form>
                    <div class="mt-2">
                        <label class="form-label font-weight-bold">Decrypted text:</label>
                        <input type="text" class="form-control" id="transpositionDecryptedResult" readonly/>
                    </div>
                </td>
            </tr>
        </table>

        <a href="/" class="btn btn-link">Quay lại trang chủ</a>
    </div>

    <script>
        document.getElementById('transposition-encrypt-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const plainText = document.getElementById('transpositionPlainText').value;
            const key = document.getElementById('transpositionKeyEncrypt').value;

            const response = await fetch('/api/transposition/encrypt', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ plain_text: plainText, key: key })
            });
            const data = await response.json();
            document.getElementById('transpositionEncryptedResult').value = data.encrypted_text || '';
        });

        document.getElementById('transposition-decrypt-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const cipherText = document.getElementById('transpositionCipherText').value;
            const key = document.getElementById('transpositionKeyDecrypt').value;

            const response = await fetch('/api/transposition/decrypt', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ cipher_text: cipherText, key: key })
            });
            const data = await response.json();
            document.getElementById('transpositionDecryptedResult').value = data.decrypted_text || '';
        });
    </script>
</body>
</html>
