<!DOCTYPE html>
<html lang="en">
<head>
    <title>Caesar Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
    <div class="container mt-4">
        <table class="table">
            <tr><td style="text-align: center; font-weight: bold; font-size: 25px;">CAESAR CIPHER</td></tr>
            <tr><td style="font-weight: bold; color: blue">ENCRYPTION</td></tr>
            <tr>
                <td>
                    <form id="caesar-encrypt-form">
                        <div class="mb-3">
                            <label class="form-label">Plain text:</label>
                            <input type="text" class="form-control" id="caesarPlainText" placeholder="Input Plain Text" required autofocus/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Key:</label>
                            <input type="number" class="form-control" id="caesarKeyEncrypt" placeholder="Input Key" required/>
                        </div>
                        <button type="submit" class="btn btn-primary">Encrypt</button>
                    </form>
                    <div class="mt-2">
                        <label class="form-label font-weight-bold">Encrypted text:</label>
                        <input type="text" class="form-control" id="caesarEncryptedResult" readonly/>
                    </div>
                </td>
            </tr>

            <tr><td style="font-weight: bold; color: blue">DECRYPTION</td></tr>
            <tr>
                <td>
                    <form id="caesar-decrypt-form">
                        <div class="mb-3">
                            <label class="form-label">Cipher text:</label>
                            <input type="text" class="form-control" id="caesarCipherText" placeholder="Input Cipher Text" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Key:</label>
                            <input type="number" class="form-control" id="caesarKeyDecrypt" placeholder="Input Key" required/>
                        </div>
                        <button type="submit" class="btn btn-success">Decrypt</button>
                    </form>
                    <div class="mt-2">
                        <label class="form-label font-weight-bold">Decrypted text:</label>
                        <input type="text" class="form-control" id="caesarDecryptedResult" readonly/>
                    </div>
                </td>
            </tr>
        </table>

        <a href="/" class="btn btn-link">Quay lại trang chủ</a>
    </div>
    <script>
        document.getElementById('caesar-encrypt-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const plainText = document.getElementById('caesarPlainText').value;
            const key = document.getElementById('caesarKeyEncrypt').value;

            const response = await fetch('/api/caesar/encrypt', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ plain_text: plainText, key: key })
            });
            const data = await response.json();
            document.getElementById('caesarEncryptedResult').value = data.encrypted_message || '';
        });

        document.getElementById('caesar-decrypt-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const cipherText = document.getElementById('caesarCipherText').value;
            const key = document.getElementById('caesarKeyDecrypt').value;

            const response = await fetch('/api/caesar/decrypt', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ cipher_text: cipherText, key: key })
            });
            const data = await response.json();
            document.getElementById('caesarDecryptedResult').value = data.decrypted_message || '';
        });
    </script>
  </body>
</html>
